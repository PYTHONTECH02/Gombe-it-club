kind = "web"
previewPath = "/"
title = "Gombe SS ICT Club"
version = "1.0.0"
id = "artifacts/gombe-ict-club"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20671

[services.development]
run = "pnpm --filter @workspace/gombe-ict-club run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gombe-ict-club", "run", "build" ]
publicDir = "artifacts/gombe-ict-club/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20671"
BASE_PATH = "/"
